<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Regen Atlas</title>
  <link rel="icon" type="images/1.png" href="images/1.png">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <input type="checkbox" name="" id="chk1">
    <div class="logo"><a href="https://twitter.com/theregenatlas"><img src="images/logo.png" alt="logo"></a></div>
    <nav>
      <ul>
        <li>
          <select id="assetTypeFilter" class="drop_menu">
            <option value="all">All Asset Types</option>
            <option value="Derivative">Derivative</option>
            <option value="Environmental Process Token">Environmental Process Token</option>
            <option value="Nonpossessory right">Nonpossessory right</option>
            <option value="Ownership">Ownership</option>
          </select>
        </li>
        <li>
          <select id="issuerFilter" class="drop_menu">
            <option value="all">All Issuers</option>
            <option value="SolidWorld">Solidworld</option>
            <option value="Regen Network">Regen Network</option>
            <option value="Coorest">Coorest</option>
            <option value="GreenTrade">GreenTrade</option>
            <option value="Moss">Moss</option>
            <option value="Creol">Creol</option>
            <option value="Frigg.eco">Frigg.eco</option>
            <option value="Senken">Senken</option>
            <option value="Nat5">Nat5</option>
            <option value="Nori">Nori</option>
            <option value="Glow">Glow</option>
          </select>
        </li>
        <!-- <li><a href="#">Location</a></li> -->
        <li>
          <div class="buttons"><a
              href="https://docs.google.com/forms/d/e/1FAIpQLSeuQ0rvSOMiV5r3lfQuj2D436PMnJuDpqYZ-k1CVOT1OlYQbA/viewform"
              class="button1" target="_blank" rel="noopener">Add Assets</a></div>
        </li>
      </ul>
    </nav>
    <div class="menu">
      <label for="chk1">
        <i class="fa fa-bars"></i>
      </label>
    </div>
  </header>
  <div id="map"></div>
  <div id="info-boxs"></div>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQ76bhCoXtY-zwkicA8zDEOJBNvgM8LAE",
      authDomain: "regen-atlas-prototype-v2.firebaseapp.com",
      projectId: "regen-atlas-prototype-v2",
      storageBucket: "regen-atlas-prototype-v2.appspot.com",
      messagingSenderId: "604538861195",
      appId: "1:604538861195:web:63f6a865b77a96dc2c068e"
    };

    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const cities = [];

    mapboxgl.accessToken = 'pk.eyJ1IjoiYWJieWNsIiwiYSI6ImNsc3lwMHF3ODA1MXoybW5yb29vd3RsbmIifQ.dwY1ecm1bGatBCXGOdRCWQ';
    // These options control the camera position after animation
    const map = new mapboxgl.Map({
      container: 'map',
      // Choose from Mapbox's core styles, or make your own style with Mapbox Studio
      style: 'mapbox://styles/mapbox/streets-v12',
      center: [50, 20],
      zoom: 3
    });

    map.addControl(new mapboxgl.NavigationControl());

    // extend mapboxGL Marker so we can pass in an onClick handler
    class ClickableMarker extends mapboxgl.Marker {
      // new method onClick, sets _handleClick to a function you pass in
      onClick(handleClick) {
        this._handleClick = handleClick;
        return this;
      }

      // the existing _onMapClick was there to trigger a popup
      // but we are hijacking it to run a function we define
      _onMapClick(e) {
        const targetElement = e.originalEvent.target;
        const element = this._element;

        if (this._handleClick && (targetElement === element || element.contains((targetElement)))) {
          this._handleClick();
        }
      }
    };

    const closeInfoBox = () => {
      document.getElementById("info-boxs").innerHTML = "";
    }

    db.collection("cities").get().then((querySnapshot) => {
      querySnapshot.forEach((doc) => {
        cities.push(doc.data())
      });

      cities.forEach((city) => {
        new ClickableMarker()
          .setLngLat(city.coordinates)
          .onClick(() => { // onClick() is a thing now!
            document.getElementById('info-boxs').innerHTML = `<div id="info-box"><span class="close" onclick="closeInfoBox()">&times;</span>
          <div class="head-popup"><b> ${city.name}</b></div>
          <img class="image_set" src="${city.Image}"/><div class="pop_text">${city.asset_type}</div>
          <div class="pop_text">${city.asset_subtype}</div><div class="pop_text">${city.Text}</div>
          <div class="pop_text">${city.issuer}</div><div class="button">${city.button}</div></div>`;
          })
          .addTo(map);
      });
    });
  </script>
</body>

</html>
